name: ci

on:
  push:
  pull_request:

jobs:
  zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build fmt-check
      - run: zig build test
      - run: zig build

  cross-compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - aarch64-macos-none
          - x86_64-macos-none
          - aarch64-linux-gnu
          - x86_64-linux-gnu
          - aarch64-windows-gnu
          - x86_64-windows-gnu
          - aarch64-linux-android
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build check -Dtarget=${{ matrix.target }}
